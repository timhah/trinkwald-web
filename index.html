<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrinkWald — Trink Wasser, züchte deinen Regenwald</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Rounded', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }
        .emoji-logo { font-size: 64px; margin-bottom: 16px; }
        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #1b5e20;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 15px;
            color: #388e3c;
            margin-bottom: 32px;
            line-height: 1.4;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px 24px;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            text-decoration: none;
            margin-bottom: 12px;
            transition: transform 0.15s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: linear-gradient(135deg, #2e7d32, #388e3c);
            color: white;
        }
        .btn-secondary {
            background: rgba(46,125,50,0.1);
            color: #2e7d32;
        }
        .features {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 24px;
            font-size: 13px;
            color: #4caf50;
        }
        .feature { text-align: center; }
        .feature-emoji { font-size: 24px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji-logo">🌿💧</div>
        <h1>TrinkWald</h1>
        <p class="subtitle">Trink Wasser, züchte deinen Regenwald.<br>Sammle Tiere, Pflanzen und Achievements!</p>
        <a href="https://testflight.apple.com/join/vkCrTPqH" class="btn btn-primary">
            App laden (TestFlight)
        </a>
        <div class="features">
            <div class="feature">
                <span class="feature-emoji">🌳</span>
                Regenwald
            </div>
            <div class="feature">
                <span class="feature-emoji">🦜</span>
                Tiere sammeln
            </div>
            <div class="feature">
                <span class="feature-emoji">🏆</span>
                Challenges
            </div>
            <div class="feature">
                <span class="feature-emoji">👫</span>
                Freunde
            </div>
        </div>
    </div>
</body>
</html>
